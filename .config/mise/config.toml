[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

[env]
MISE_AQUA_REGISTRIES = "file://{{env.HOME}}/.dotfiles/.config/mise/aqua-registry.yaml"

[tools]
gh = "latest"
lazygit = "latest"
neovim = "latest"
ni = "latest"
node = "latest"
starship = "latest"

[dotfiles]
"~/.gitconfig" = {}
"~/.gitignore_global" = {}
"~/.zshrc" = {}
"~/.config/ghostty/config" = {}
"~/.config/nvim" = {}
"~/.config/mise/config.toml" = {}
"~/.zprofile" = {}

[tasks.update-antigen]
description = "Download antigen zsh plugin manager"
run = "curl -L git.io/antigen > ~/.dotfiles/antigen/antigen.zsh"
